<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sasreya Foods</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; display: flex; height: 100vh; background-color: #f4f6f8; overflow: hidden; }
        
        /* --- Sidebar Navigation --- */
        .sidebar { width: 250px; background: #fff; padding: 20px; box-shadow: 2px 0 5px rgba(0,0,0,0.05); display: flex; flex-direction: column; z-index: 10; }
        
        /* --- BRANDING (Logo & Title) --- */
        .sidebar-header { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 5px; }
        .brand-logo { width: 45px; height: 45px; border-radius: 25px; object-fit: cover; }
        
        /* Change the color of 'Sasreya Foods' here */
        .brand-name { color: #e67e22; margin: 0; font-size: 1.5em; text-align: left; } 
        
        .sidebar p { text-align: center; color: #777; font-size: 0.85em; margin-bottom: 30px; margin-top: 5px; }
        
        .nav-links { display: flex; flex-direction: column; gap: 10px; }
        .nav-btn { background: transparent; color: #555; border: none; padding: 12px 15px; border-radius: 8px; font-size: 1.1em; cursor: pointer; text-align: left; font-weight: bold; transition: 0.2s; display: flex; justify-content: space-between; align-items: center;}
        .nav-btn:hover { background: #f0fdf4; color: #2ecc71; }
        .nav-btn.active { background: #2ecc71; color: white; }
        .nav-badge { background: #e74c3c; color: white; padding: 2px 8px; border-radius: 12px; font-size: 0.8em; display: none; }

        /* --- Main Content Area --- */
        .main-content { flex: 1; padding: 30px; overflow-y: auto; }
        .view { display: none; animation: fadeIn 0.3s; }
        .view.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- Products Grid --- */
        .products { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .product-card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); text-align: center; }
        .product-card img { max-width: 100%; border-radius: 8px; height: 160px; object-fit: cover; }
        .price { font-size: 1.2em; font-weight: bold; color: #2ecc71; margin: 5px 0; }
        
        .weight-select { width: 100%; padding: 8px; margin: 10px 0; border-radius: 5px; border: 1px solid #ddd; font-family: inherit; font-size: 1em; outline: none; }
        .action-btn { background: #3498db; color: white; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; transition: 0.2s;}
        .action-btn:hover { background: #2980b9; }
        
        .qty-controls { display: flex; align-items: center; justify-content: space-between; background: #f1f1f1; border-radius: 6px; height: 39px; overflow: hidden;}
        .qty-controls button { width: 35%; background: transparent; color: #333; font-size: 1.2em; border: none; cursor: pointer; height: 100%; transition: 0.2s; }
        .qty-controls button:hover { background: #e2e2e2; }
        .qty-controls span { width: 30%; font-weight: bold; text-align: center; }

        /* --- Cart Section --- */
        .cart-container { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); max-width: 600px; margin: 0 auto; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        .cart-item-details { text-align: left; }
        .cart-item-details small { color: #777; display: block; margin-top: 4px;}
        .whatsapp-btn { background: #25D366; color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; font-size: 1.1em; margin-top: 20px; transition: 0.2s;}
        .whatsapp-btn:hover { background: #20b858; }

        /* --- Floating Cart Button --- */
        .floating-cart {
            position: fixed; bottom: 25px; right: 25px;
            width: 65px; height: 65px;
            background: #2ecc71; color: white;
            border-radius: 50%; display: none; 
            align-items: center; justify-content: center;
            font-size: 28px; cursor: pointer;
            box-shadow: 0 4px 12px rgba(46, 204, 113, 0.4); border: none; z-index: 1000;
            transition: transform 0.2s;
        }
        .floating-cart:hover { transform: scale(1.05); }
        .floating-badge {
            position: absolute; top: -2px; right: -2px;
            background: #e74c3c; color: white;
            border-radius: 50%; width: 24px; height: 24px; 
            font-size: 12px; font-weight: bold;
            display: flex; align-items: center; justify-content: center;
            border: 2px solid white;
        }

        /* --- Loading Animation --- */
        .loader-container { grid-column: 1 / -1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 50px 0; color: #777; }
        .spinner { width: 45px; height: 45px; border: 4px solid #f3f3f3; border-top: 4px solid #2ecc71; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* --- Mobile Responsiveness --- */
        @media (max-width: 768px) {
            body { flex-direction: column; overflow: auto;}
            .sidebar { width: 100%; padding: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
            .sidebar-header { justify-content: flex-start; margin-bottom: 5px; }
            .sidebar p { display: none; }
            .nav-links { flex-direction: row; gap: 10px; }
            .nav-btn { flex: 1; padding: 10px; font-size: 1em; justify-content: center; gap: 8px;}
            .main-content { padding: 15px; overflow-y: visible; }
            .cart-container { padding: 15px; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        
        <div class="sidebar-header">
            <img src="https://placehold.co/100x100/e67e22/white?text=SF" alt="Sasreya Logo" class="brand-logo">
            <h2 class="brand-name">Sasreya Foods</h2>
        </div>
        
        <p>Homemade Pickles & Snacks</p>
        <div class="nav-links">
            <button class="nav-btn active" id="nav-products" onclick="switchTab('products')">
                🛍️ Products
            </button>
            <button class="nav-btn" id="nav-cart" onclick="switchTab('cart')">
                🛒 Cart <span class="nav-badge" id="nav-cart-badge">0</span>
            </button>
        </div>
    </div>

    <div class="main-content">
        
        <div id="products-tab" class="view active">
            <div class="products" id="product-list">
                <div class="loader-container">
                    <div class="spinner"></div>
                    <p>Loading fresh items from the kitchen...</p>
                </div>
            </div>
        </div>

        <div id="cart-tab" class="view">
            <div class="cart-container">
                <h2 style="margin-top: 0; color: #333;">Your Shopping Cart</h2>
                <div id="cart-items">
                    <p style="color: #777;">Your cart is empty.</p>
                </div>
                <h3 style="margin-top: 20px; border-top: 2px solid #eee; padding-top: 15px;">
                    Total Amount: ₹<span id="cart-total">0</span>
                </h3>
                <button class="whatsapp-btn" onclick="checkoutWhatsApp()">Proceed to WhatsApp Checkout</button>
            </div>
        </div>

    </div>

    <button class="floating-cart" id="floating-cart" onclick="switchTab('cart')">
        🛒 <span class="floating-badge" id="floating-badge">0</span>
    </button>

    <script>
        // --- 1. CONFIGURATION ---
        const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQkdpMJkEjlGqWVQmKUy9GZk_tabKkAxxgDrW5SGpe2r3vL-uoWOInuvhomxTdsrihJEhqfKvAQHFAK/pub?output=csv'; 
        const WHATSAPP_NUMBER = '918590360735'; 

        // --- 2. APP LOGIC ---
        let cart = [];
        let globalProducts = []; 

        Papa.parse(SHEET_CSV_URL, {
            download: true,
            header: true,
            complete: function(results) {
                globalProducts = results.data.filter(p => p.name); 
                displayProducts();
            }
        });

        function switchTab(tabId) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(tabId + '-tab').classList.add('active');
            
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('nav-' + tabId).classList.add('active');

            window.scrollTo(0, 0); 
        }

        function displayProducts() {
            const productList = document.getElementById('product-list');
            productList.innerHTML = ''; 

            globalProducts.forEach((product, index) => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <img src="${product.image}" alt="${product.name}">
                    <h3 style="margin: 10px 0 5px 0;">${product.name}</h3>
                    <p style="font-size: 0.85em; color: #777; margin-bottom: 10px; height: 34px; overflow: hidden;">${product.description}</p>
                    
                    <select id="weight-${index}" class="weight-select" onchange="updateCardActionUI(${index})">
                        <option value="" disabled selected>-- choose quantity --</option>
                        <option value="0.25">250 g</option>
                        <option value="0.5">500 g</option>
                        <option value="1">1 kg</option>
                        <option value="2">2 kg</option>
                    </select>
                    
                    <div class="price" id="price-${index}">₹${product.price} / kg</div>
                    <div id="action-${index}"></div>
                `;
                productList.appendChild(card);
                updateCardActionUI(index); 
            });
        }

        // Alerts the user if they try to add to cart without picking a size
        function promptSelection(index) {
            alert("Please choose a quantity first!");
            document.getElementById(`weight-${index}`).focus();
        }

        function updateCardActionUI(index) {
            const select = document.getElementById(`weight-${index}`);
            const actionContainer = document.getElementById(`action-${index}`);
            const priceContainer = document.getElementById(`price-${index}`);
            const product = globalProducts[index];
            
            // Handle state where no size is selected yet
            if (select.value === "") {
                priceContainer.innerText = `₹${product.price} / kg`; 
                actionContainer.innerHTML = `
                    <button class="action-btn" onclick="promptSelection(${index})">Add to Cart</button>
                `;
                return; 
            }

            // Normal math if a size is selected
            const weightLabel = select.options[select.selectedIndex].text;
            const weightMultiplier = parseFloat(select.value);
            const basePrice = parseFloat(product.price);
            const currentPrice = Math.round(basePrice * weightMultiplier);
            
            priceContainer.innerText = `₹${currentPrice}`;
            const cartItem = cart.find(i => i.name === product.name && i.weightLabel === weightLabel);

            if (cartItem) {
                actionContainer.innerHTML = `
                    <div class="qty-controls">
                        <button onclick="updateQtyFromCard(${index}, -1)">-</button>
                        <span>${cartItem.qty}</span>
                        <button onclick="updateQtyFromCard(${index}, 1)">+</button>
                    </div>
                `;
            } else {
                actionContainer.innerHTML = `
                    <button class="action-btn" onclick="addToCart(${index}, ${currentPrice})">Add to Cart</button>
                `;
            }
        }

        function addToCart(index, calculatedPrice) {
            const select = document.getElementById(`weight-${index}`);
            const weightLabel = select.options[select.selectedIndex].text;
            const product = globalProducts[index];

            cart.push({ name: product.name, weightLabel: weightLabel, price: calculatedPrice, qty: 1 });
            updateCartUI();
        }

        function updateQtyFromCard(index, change) {
            const select = document.getElementById(`weight-${index}`);
            changeCartQty(globalProducts[index].name, select.options[select.selectedIndex].text, change);
        }

        function changeCartQty(name, weightLabel, change) {
            const itemIndex = cart.findIndex(i => i.name === name && i.weightLabel === weightLabel);
            if (itemIndex > -1) {
                cart[itemIndex].qty += change;
                if (cart[itemIndex].qty <= 0) cart.splice(itemIndex, 1); 
            }
            updateCartUI();
        }

        function updateCartUI() {
            const cartItemsContainer = document.getElementById('cart-items');
            const cartTotal = document.getElementById('cart-total');
            
            cartItemsContainer.innerHTML = '';
            let totalMoney = 0;
            let totalItems = 0;

            if (cart.length === 0) {
                cartItemsContainer.innerHTML = '<p style="color: #777;">Your cart is empty.</p>';
            } else {
                cart.forEach(item => {
                    totalMoney += item.price * item.qty;
                    totalItems += item.qty;
                    cartItemsContainer.innerHTML += `
                        <div class="cart-item">
                            <div class="cart-item-details">
                                <strong style="font-size: 1.1em;">${item.name}</strong>
                                <small>${item.weightLabel} - ₹${item.price}</small>
                            </div>
                            <div class="qty-controls" style="width: 90px; height: 35px; background: #fff; border: 1px solid #ddd;">
                                <button onclick="changeCartQty('${item.name}', '${item.weightLabel}', -1)">-</button>
                                <span>${item.qty}</span>
                                <button onclick="changeCartQty('${item.name}', '${item.weightLabel}', 1)">+</button>
                            </div>
                        </div>
                    `;
                });
            }

            cartTotal.innerText = totalMoney;

            const floatingBtn = document.getElementById('floating-cart');
            const floatingBadge = document.getElementById('floating-badge');
            const navBadge = document.getElementById('nav-cart-badge');

            if (totalItems > 0) {
                floatingBtn.style.display = 'flex';
                floatingBadge.innerText = totalItems;
                navBadge.style.display = 'inline-block';
                navBadge.innerText = totalItems;
            } else {
                floatingBtn.style.display = 'none';
                navBadge.style.display = 'none';
            }

            globalProducts.forEach((_, index) => {
                if (document.getElementById(`weight-${index}`)) updateCardActionUI(index);
            });
        }

        function checkoutWhatsApp() {
            if (cart.length === 0) {
                alert("Please add items to your cart first!");
                switchTab('products'); 
                return;
            }

            let message = "Hello Sasreya Foods! I would like to order:\n\n";
            let total = 0;

            cart.forEach(item => {
                message += `▪ ${item.name} (${item.weightLabel}) x${item.qty} = ₹${item.price * item.qty}\n`;
                total += item.price * item.qty;
            });

            message += `\n*Total Amount: ₹${total}*\n\nPlease let me know how to pay and provide delivery details.`;

            const whatsappUrl = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(message)}`;
            window.open(whatsappUrl, '_blank');
        }
    </script>
</body>
</html>
